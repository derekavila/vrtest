<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rive Hello World</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      canvas {
        margin: 0;
        padding: 0;
        width: 100% !important;
        height: 100% !important;
        max-width: 100%;
        max-height: 100%;
        display: block;
      }
    </style>
  </head>
  <body style="background-color: #000000; ">
    <canvas id="canvas"></canvas>

    <script src="https://unpkg.com/@rive-app/webgl2"></script>
    <script>
      const canvas = document.getElementById("canvas");
      const dpr = Math.min(window.devicePixelRatio || 1, 2); // Cap at 2
      console.log("paso0");
      const r = new rive.Rive({
        src: "assets/vr_showroom.riv",
        canvas,
        autoplay: true,
        stateMachines: "Main State Machine",
        onLoad: () => {
          // Ensure the drawing surface matches the canvas size and device pixel ratio
          r.resizeDrawingSurfaceToCanvas();
          console.log("paso1")
          const namedVM = r.viewModelByName("MainVM");
          console.log("paso2")
          const vmiDefault = namedVM.instanceByName("Instance");
          console.log("paso3")
          r.bindViewModelInstance(vmiDefault);
          console.log("paso4")
        }
      });
           function resizeCanvas(){
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            // Quitar el menos 100 cuando sea ambiente productivo
            r.resizeDrawingSurfaceToCanvas();
            console.log("redimensionando")
          }
      window.addEventListener('resize', resizeCanvas, false); 
      resizeCanvas();
      console.log("paso5")
    </script>
  </body>
</html>
