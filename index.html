<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aldera VR Showroom</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      canvas {
        margin: 0;
        padding: 0;
        display: block;
        background-color: black;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script src="https://unpkg.com/@rive-app/webgl2"></script>
    <script>
      const canvas = document.getElementById("canvas");
      const { Layout, Fit, Alignment } = rive;
    
      const r = new rive.Rive({
        src: "assets/vr_showroom-v3.riv",
        canvas: canvas,
        audoBind: true,
        autoplay: true,
        stateMachines: "State Machine 1",
        layout: new Layout({
          fit: Fit.Layout,
          alignment: Alignment.Center,
        }),
        onLoad: () => {
          console.log("Comienza Callback");
          r.resizeDrawingSurfaceToCanvas();
          const vm = r.viewModelByName("MainVM");
          console.log("Acceso al ViewModel");
          const vmi = vm.defaultInstance();
          console.log("Creación de Instancia");
          r.bindViewModelInstance(vmi);
          console.log("Binding de Instancia");
        },
      });
      function resizeCanvas(){
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            r.resizeDrawingSurfaceToCanvas();
          }
      window.addEventListener('resize', resizeCanvas, false); 
      resizeCanvas();
      console.log("Se finalizó el script");
    </script>
  </body>
</html>
